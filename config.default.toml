# buoya-news-mcp default configuration.
# Committed defaults. User overrides go in config.toml (gitignored if it holds tokens).
# Every field here has a matching #[serde(default)] in src/config.rs, so a missing
# config.toml still produces a valid configuration.


# --- RSS feeds: one [[sources.rss]] table per feed; remove an entry to disable it ---

[[sources.rss]]
name = "coindesk"
url = "https://www.coindesk.com/arc/outboundfeeds/rss/"
category = "crypto"

[[sources.rss]]
name = "cointelegraph"
url = "https://cointelegraph.com/rss"
category = "crypto"

[[sources.rss]]
name = "rekt"
url = "https://rekt.news/rss/feed.xml"
category = "security"

[[sources.rss]]
name = "theblock"
url = "https://www.theblock.co/rss.xml"
category = "crypto"

[[sources.rss]]
name = "decrypt"
url = "https://decrypt.co/feed"
category = "crypto"

[[sources.rss]]
name = "bitcoinmagazine"
url = "https://bitcoinmagazine.com/feed"
category = "crypto"

[[sources.rss]]
name = "bankless"
url = "https://www.bankless.com/rss/feed"
category = "crypto"

[[sources.rss]]
name = "thedefiant"
url = "https://thedefiant.io/api/feed"
category = "defi"

[[sources.rss]]
name = "ethereum-foundation"
url = "https://blog.ethereum.org/en/feed.xml"
category = "crypto"

[[sources.rss]]
name = "stellar"
url = "https://www.stellar.org/blog/rss.xml"
category = "crypto"

[[sources.rss]]
name = "hedera"
url = "https://hedera.com/blog/rss.xml"
category = "crypto"

[[sources.rss]]
name = "huggingface-blog"
url = "https://huggingface.co/blog/feed.xml"
category = "ai"

[[sources.rss]]
name = "bleepingcomputer"
url = "https://www.bleepingcomputer.com/feed/"
category = "security"

[[sources.rss]]
name = "krebsonsecurity"
url = "https://krebsonsecurity.com/feed/"
category = "security"


[sources.defillama]
enabled = true

[sources.coingecko]
enabled = true
top_n = 100


# Crypto Fear & Greed Index (alternative.me). Free, no API key. Synthesizes one
# market-sentiment snapshot per day.
[sources.fear_greed]
enabled = true

[sources.reddit]
enabled = true
subreddits = ["CryptoCurrency", "MachineLearning", "LocalLLaMA", "ethereum"]
min_upvotes = 200

[sources.arxiv]
enabled = true
categories = ["cs.AI", "cs.LG", "cs.CL"]
max_per_run = 25

[sources.huggingface]
enabled = true

[general]
watchlist = ["hedera", "hbar", "stellar", "xlm", "ethereum", "solana"]
retention_days = 90
# How often to re-run ingest, in seconds. Ingest also runs once at startup.
ingest_interval_secs = 900

[http]
timeout_ms = 15_000
user_agent = "buoya-news-agent/1.0 (personal aggregator)"


# --- Connectors: push notifications to external services ---

# Telegram push alerts on newly-ingested articles. Opt-in: disabled by default.
# The bot TOKEN is a secret and goes in the environment (TELEGRAM_BOT_TOKEN), not
# here. Only runs under `buoya serve`. See docs/telegram-connector-plan.md for setup.
[connectors.telegram]
enabled = true
chat_id = "1125089709"          # target chat/group/channel id; required when enabled
categories = []       # category allowlist (e.g. ["defi", "security"]); empty = all
